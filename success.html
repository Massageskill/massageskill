<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 700px;
      background: #1e293b;
      padding: 40px 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 16px;
      color: #22c55e;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      margin: 10px 0;
    }

    .small {
      font-size: 14px;
      color: #cbd5e1;
      margin-top: 16px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Thank You!</h1>
    <p>Your purchase was successful.</p>
    <p>Your access details will be shared shortly.</p>
    <p class="small" id="status">Tracking conversion...</p>
  </div>

  <script>
(function () {
  const TRAFFICSTARS_KEY = "YOUR_REAL_NEW_KEY";
  const GOAL_ID = "0";

  const params = new URLSearchParams(window.location.search);
  const urlClickId = params.get("clickid");
  const storedClickId = localStorage.getItem("ts_clickid");
  const clickId = urlClickId || storedClickId;

  const statusEl = document.getElementById("status");

  if (!clickId) {
    statusEl.textContent = "No click ID found. Conversion could not be tracked.";
    return;
  }

  const postbackUrl =
    "https://tsyndicate.com/api/v1/cpa/action?clickid=" +
    encodeURIComponent(clickId) +
    "&goalid=" + encodeURIComponent(GOAL_ID) +
    "&key=" + encodeURIComponent(TRAFFICSTARS_KEY);

  setTimeout(() => {
    fetch(postbackUrl, {
      method: "GET",
      mode: "no-cors"
    })
    .then(() => {
      statusEl.textContent = "Conversion tracking sent.";
    })
    .catch(() => {
      statusEl.textContent = "Tracking request attempted.";
    });
  }, 300);
})();
</script>
</body>
</html>
